<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/fontsource@latest/merriweather/index.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e8d8cc;
            font-family: 'Merriweather', Georgia, serif;
            overflow: hidden;
            padding: 2rem;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4rem;
            max-width: 1100px;
            width: 100%;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .error-code {
            font-size: clamp(6rem, 12vw, 10rem);
            font-weight: 300;
            line-height: 1;
            background: linear-gradient(
                180deg,
                #5a3e2b 0%,
                #8b7355 50%,
                #a89279 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 1s ease-out;
        }

        .error-text {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #5a3e2b;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.3s forwards;
        }

        .error-text .arrow {
            display: inline-block;
            animation: bounceRight 1.5s ease-in-out infinite;
        }

        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            background-color: #8b7355;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.05rem;
            font-family: 'Merriweather', Georgia, serif;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.6s forwards;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.3);
        }

        .btn:hover {
            background-color: #6b5640;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.45);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(139, 115, 85, 0.3);
        }

        .cat-container {
            flex: 1;
            display: flex;
            justify-content: center;
            animation: fadeInRight 1.2s ease-out 0.2s both;
        }

        .cat-container img {
            max-width: 100%;
            max-height: 80vh;
            width: clamp(280px, 25vw, 460px);
            height: auto;
            filter: drop-shadow(0 10px 30px rgba(90, 62, 43, 0.15));
            transition: transform 0.4s ease;
        }

        .cat-container img:hover {
            transform: scale(1.03) rotate(1deg);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes bounceRight {
            0%, 100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(6px);
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                gap: 2rem;
                text-align: center;
            }

            .content {
                align-items: center;
            }

            .cat-container img {
                width: clamp(220px, 50vw, 300px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="error-code">404</div>
            <p class="error-text">
                Страница не найдена <span class="arrow">→</span>
            </p>
            <a href="/" class="btn">Перейти на главную</a>
        </div>
        <div class="cat-container">
            <img src="https://image.qwenlm.ai/public_source/c356107a-d85b-49a7-9d1b-593750a39865/180647b5b-5092-4065-bea7-cb9d48df4904.png" alt="Грустный котёнок" />
        </div>
    </div>
</body>
</html>
